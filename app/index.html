<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Sentinel | Privacy Layer" />
  <meta property="og:description" content="Prove your bank balance to anyone — without sharing your credentials. Zero-knowledge financial attestations powered by ZK-TLS." />
  <meta property="og:image" content="/og-image.svg" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Sentinel | Privacy Layer" />
  <meta name="twitter:description" content="Prove your bank balance to anyone — without sharing your credentials. Zero-knowledge financial attestations powered by ZK-TLS." />
  <meta name="twitter:image" content="/og-image.svg" />

  <!-- General -->
  <meta name="description" content="Prove your bank balance to anyone — without sharing your credentials. Zero-knowledge financial attestations powered by ZK-TLS." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Public+Sans:wght@500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    (function () {
      const theme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
    })();
  </script>
  <title>Sentinel | Privacy Layer</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
